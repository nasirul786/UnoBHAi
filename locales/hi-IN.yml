info_bluff: Jab koi player +4 card play karta hai, to next wala usko challenge kar sakta hai. Agar jisne +4 card play kiya hai uske paas koi aur card hai jo wo play kar sakta tha, to usko 4 cards draw karne padenge. Agar nahi hai, to jisne challenge kiya hai usko 6 cards draw karne padenge.
