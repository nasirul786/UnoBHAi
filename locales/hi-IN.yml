info_one_win: Jab pehle player ke saare cards khatam ho jaate hai, to game khatam ho jaata hai aur wo hi winner hota hai.
one_card: UNO bol
info_one_card: Jab kisi player ke paas sirf ek card bachta hai, to usko UNO bolna padta hai. Agar wo nahi bolta, to usko 2 cards draw karne padenge.
auto_pin: Auto pin
info_auto_pin: Jab game start hota hai, bot automatically game wala message pin kar dega.
stack: Stack draw cards
info_stack: Jab kisi player ko +2 ya +4 card milta hai, to wo apna ek aur +2 ya +4 card play kar sakta hai. Agle player ko total jitne cards bane hai utne draw karne padenge.
draw_one: Draw one card
info_draw_one: Jab player card nahi khel sakta, to usko ek card uthana padega aur turn pass karna hoga.
